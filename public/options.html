<!DOCTYPE html>
<html>
<head>
    <title>Visited Pages History</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; }
        #historyList { border: 1px solid #ccc; padding: 10px; max-height: 600px; overflow-y: auto; }
        .visit-item { margin-bottom: 10px; padding: 8px; border-bottom: 1px dashed #eee; }
        .visit-item:last-child { border-bottom: none; }
        .visit-item strong { display: block; color: #0056b3; }
        .visit-item span { font-size: 0.9em; color: #666; }
        .visit-item a { color: #007bff; text-decoration: none; }
        .visit-item a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Visited Pages History</h1>
    <div id="historyList">Loading history...</div>
    <script src="options.js"></script>
</body>
</html>
