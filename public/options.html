<!DOCTYPE html>
<html>
<head>
    <title>Visited Pages History</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #333; display: inline-block; margin-right: 20px; }
        #downloadBtn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: white;
            cursor: pointer;
            font-size: 0.9em;
        }
        #downloadBtn:hover {
            background: #0056b3;
        }
        #historyList { 
            border: 1px solid #ccc; 
            padding: 10px; 
            max-height: 600px; 
            overflow-y: auto; 
            margin-top: 20px;
        }
        .visit-item { 
            margin-bottom: 10px; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            background: #fafafa;
        }
        .visit-item:last-child { border-bottom: none; }
        .visit-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .visit-item strong { 
            color: #0056b3; 
        }
        .visit-item span { 
            font-size: 0.9em; 
            color: #555; 
        }
        .visit-item a { 
            color: #007bff; 
            text-decoration: none; 
        }
        .visit-item a:hover { 
            text-decoration: underline; 
        }
        .favicon {
            width: 16px;
            height: 16px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Visited Pages History</h1>
    <button id="downloadBtn">Download JSON</button>
    <div id="historyList">Loading history...</div>
    
    <script src="options.js">   </script>
</body>
</html>
